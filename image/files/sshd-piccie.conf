# Piccie SSH hardening drop-in (/etc/ssh/sshd_config.d/).
#
# The booth sits on venue Wi-Fi, so SSH is key-only. Phone onboarding installs
# the operator's optional public key in /data/ssh/authorized_keys, which remains
# writable and persistent under the read-only-root overlay.
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PermitRootLogin no
# Look for keys in the normal per-user location AND the persistent /data copy.
AuthorizedKeysFile .ssh/authorized_keys /data/ssh/authorized_keys
