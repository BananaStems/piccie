name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest -q
        env:
          PICCIE_CAMERA: mock
      - run: python -m compileall -q engine
      - run: node --check web/js/studio.js && node --check web/js/screens/templates.js && node --check web/js/screens/editor.js
      - run: node --test cloud/test/worker.test.js
      - run: bash -n image/*.sh scripts/*.sh
